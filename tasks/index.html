<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Görev Takip | Ali Demirbilek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0F172A; --navy-2: #1E293B; --navy-3: #263348;
      --blue: #3B82F6; --blue-d: #1D4ED8;
      --green: #10B981; --red: #EF4444; --yellow: #F59E0B; --purple: #8B5CF6;
      --slate: #94A3B8; --white: #F1F5F9;
      --border: rgba(255,255,255,0.08);
    }
    html, body { min-height: 100vh; font-family: 'Inter', sans-serif; background: var(--navy); color: var(--white); }

    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; }
    .logo span { color: var(--blue); }
    .back-link { font-size: 0.82rem; color: var(--slate); text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: var(--blue); }

    main { max-width: 820px; margin: 0 auto; padding: 40px 5%; }

    .page-title { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }
    .page-title span { color: var(--blue); }
    .page-sub { color: var(--slate); font-size: 0.95rem; margin-bottom: 36px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: var(--navy-2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .stat-lbl { font-size: 0.72rem; color: var(--slate); font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; }

    .add-form { background: var(--navy-2); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 24px; }
    .add-form-title { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--slate); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
    .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .form-input {
      flex: 1; background: var(--navy-3); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 12px 16px;
      color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.92rem;
      outline: none; transition: border-color 0.2s;
    }
    .form-input::placeholder { color: var(--slate); }
    .form-input:focus { border-color: var(--blue); }
    select.form-input { cursor: pointer; }
    .add-btn {
      background: var(--blue); color: var(--white); border: none;
      border-radius: 8px; padding: 12px 22px;
      font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .add-btn:hover { background: var(--blue-d); }

    .filters-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-chip {
      background: var(--navy-2); border: 1px solid var(--border);
      color: var(--slate); border-radius: 20px; padding: 6px 14px;
      font-size: 0.8rem; cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .filter-chip.active { border-color: var(--blue); color: var(--blue); background: rgba(59,130,246,0.1); }

    .tasks-list { display: flex; flex-direction: column; gap: 10px; }
    .task-item {
      background: var(--navy-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color 0.2s, opacity 0.3s;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .task-item:hover { border-color: rgba(255,255,255,0.15); }
    .task-item.done { opacity: 0.5; }

    .task-check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border); cursor: pointer;
      flex-shrink: 0; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .task-check:hover { border-color: var(--green); }
    .task-item.done .task-check { background: var(--green); border-color: var(--green); }
    .task-check-icon { color: white; font-size: 0.7rem; display: none; }
    .task-item.done .task-check-icon { display: block; }

    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
    .task-item.done .task-title { text-decoration: line-through; color: var(--slate); }
    .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .task-badge {
      font-size: 0.7rem; font-weight: 600; padding: 2px 8px;
      border-radius: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .badge-high   { background: rgba(239,68,68,0.15);   color: #EF4444; }
    .badge-medium { background: rgba(245,158,11,0.15);  color: #F59E0B; }
    .badge-low    { background: rgba(16,185,129,0.15);  color: #10B981; }
    .badge-work   { background: rgba(59,130,246,0.15);  color: #3B82F6; }
    .badge-personal { background: rgba(139,92,246,0.15); color: #8B5CF6; }
    .badge-study  { background: rgba(20,184,166,0.15);  color: #14B8A6; }
    .task-date { font-size: 0.75rem; color: var(--slate); }

    .task-actions { display: flex; gap: 6px; }
    .action-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--slate); border-radius: 6px; padding: 5px 10px;
      font-size: 0.75rem; cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .action-btn.delete:hover { border-color: var(--red); color: var(--red); }
    .action-btn.edit:hover   { border-color: var(--blue); color: var(--blue); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--slate); }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-text { font-size: 0.95rem; }

    .progress-bar-wrap { background: var(--navy-3); border-radius: 4px; height: 6px; margin-top: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); border-radius: 4px; transition: width 0.4s ease; }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .form-row { flex-wrap: wrap; }
      .add-btn { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Ali<span>.</span>dev</div>
  <a href="../index.html" class="back-link">← Portfolyoya Dön</a>
</header>

<main>
  <h1 class="page-title">Görev <span>Takip</span></h1>
  <p class="page-sub">Görevlerini ekle, önceliklendir ve takip et · localStorage ile kalıcı veri saklama</p>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statTotal" style="color:var(--blue)">0</div>
      <div class="stat-lbl">Toplam</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statActive" style="color:var(--yellow)">0</div>
      <div class="stat-lbl">Aktif</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statDone" style="color:var(--green)">0</div>
      <div class="stat-lbl">Tamamlanan</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statPercent" style="color:var(--purple)">0%</div>
      <div class="stat-lbl">İlerleme</div>
    </div>
  </div>

  <div class="add-form">
    <div class="add-form-title">Yeni Görev Ekle</div>
    <div class="form-row">
      <input type="text" class="form-input" id="taskInput" placeholder="Görev başlığı..." maxlength="100">
    </div>
    <div class="form-row">
      <select class="form-input" id="prioritySelect">
        <option value="medium">⚡ Orta Öncelik</option>
        <option value="high">🔴 Yüksek Öncelik</option>
        <option value="low">🟢 Düşük Öncelik</option>
      </select>
      <select class="form-input" id="categorySelect">
        <option value="work">💼 İş</option>
        <option value="personal">👤 Kişisel</option>
        <option value="study">📚 Eğitim</option>
      </select>
      <button class="add-btn" onclick="addTask()">+ Ekle</button>
    </div>
  </div>

  <div class="filters-row">
    <button class="filter-chip active" onclick="setFilter('all', this)">Tümü</button>
    <button class="filter-chip" onclick="setFilter('active', this)">Aktif</button>
    <button class="filter-chip" onclick="setFilter('done', this)">Tamamlanan</button>
    <button class="filter-chip" onclick="setFilter('high', this)">🔴 Yüksek</button>
    <button class="filter-chip" onclick="setFilter('study', this)">📚 Eğitim</button>
    <button class="filter-chip" onclick="setFilter('work', this)">💼 İş</button>
  </div>

  <div class="tasks-list" id="tasksList"></div>
</main>

<footer style="text-align:center;padding:30px;color:rgba(255,255,255,0.2);font-size:0.75rem;border-top:1px solid rgba(255,255,255,0.08);margin-top:60px;">
  <p>Ali Demirbilek tarafından geliştirildi · <a href="../index.html" style="color:var(--blue);text-decoration:none;">Portfolyo</a> · Veriler tarayıcınızda saklanır</p>
</footer>

<script>
  let tasks = JSON.parse(localStorage.getItem('ali_tasks') || '[]');
  let currentFilter = 'all';

  function save() { localStorage.setItem('ali_tasks', JSON.stringify(tasks)); }

  function addTask() {
    const input = document.getElementById('taskInput');
    const title = input.value.trim();
    if (!title) { input.focus(); return; }
    tasks.unshift({
      id: Date.now(),
      title,
      priority: document.getElementById('prioritySelect').value,
      category: document.getElementById('categorySelect').value,
      done: false,
      date: new Date().toLocaleDateString('tr-TR')
    });
    save();
    input.value = '';
    render();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function getFiltered() {
    if (currentFilter === 'all')    return tasks;
    if (currentFilter === 'active') return tasks.filter(t => !t.done);
    if (currentFilter === 'done')   return tasks.filter(t => t.done);
    if (currentFilter === 'high')   return tasks.filter(t => t.priority === 'high');
    return tasks.filter(t => t.category === currentFilter);
  }

  function render() {
    const total  = tasks.length;
    const done   = tasks.filter(t => t.done).length;
    const active = total - done;
    const pct    = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('statTotal').textContent   = total;
    document.getElementById('statActive').textContent  = active;
    document.getElementById('statDone').textContent    = done;
    document.getElementById('statPercent').textContent = pct + '%';

    const list = document.getElementById('tasksList');
    const filtered = getFiltered();

    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">${currentFilter === 'done' ? '🎉' : '📝'}</div><div class="empty-text">${currentFilter === 'done' ? 'Henüz tamamlanan görev yok.' : 'Görev bulunamadı.'}</div></div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
        <div class="task-check" onclick="toggleDone(${t.id})">
          <span class="task-check-icon">✓</span>
        </div>
        <div class="task-body">
          <div class="task-title">${t.title}</div>
          <div class="task-meta">
            <span class="task-badge badge-${t.priority}">${t.priority === 'high' ? '🔴 Yüksek' : t.priority === 'medium' ? '⚡ Orta' : '🟢 Düşük'}</span>
            <span class="task-badge badge-${t.category}">${t.category === 'work' ? '💼 İş' : t.category === 'personal' ? '👤 Kişisel' : '📚 Eğitim'}</span>
            <span class="task-date">${t.date}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="action-btn delete" onclick="deleteTask(${t.id})">Sil</button>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  if (tasks.length === 0) {
    tasks = [
      { id: 1, title: 'Portfolio sitesini GitHub\'a yükle', priority: 'high', category: 'work', done: true, date: '25.06.2026' },
      { id: 2, title: 'LinkedIn profilini güncelle', priority: 'high', category: 'work', done: true, date: '25.06.2026' },
      { id: 3, title: 'Yeni proje ekle', priority: 'medium', category: 'work', done: false, date: '25.06.2026' },
      { id: 4, title: 'JavaScript Canvas API öğren', priority: 'medium', category: 'study', done: false, date: '25.06.2026' },
      { id: 5, title: 'İş başvurusu yap', priority: 'high', category: 'work', done: false, date: '25.06.2026' },
    ];
    save();
  }

  render();
</script>

</body>
</html>
